name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate meta (stats + changelog)
        run: node scripts/generate-meta.mjs

      - name: Build
        run: npx ng build --configuration production --base-href /vibular/

      - name: SPA fallback
        run: cp dist/angular-bootstrap/browser/index.html dist/angular-bootstrap/browser/404.html

      - name: Disable Jekyll
        run: touch dist/angular-bootstrap/browser/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/angular-bootstrap/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

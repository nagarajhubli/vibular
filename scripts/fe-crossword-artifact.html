<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-mono,'Courier New',monospace);background:transparent;color:var(--color-text-primary)}
#app{max-width:900px;margin:0 auto;padding:1rem}
.screen{display:none}
.screen.active{display:block}

.terminal-header{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:.5px solid var(--color-border-tertiary)}
.terminal-header span{color:#1D9E75}
.filter-section{margin-bottom:1.5rem}
.filter-label{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem}
.filter-pills{display:flex;flex-wrap:wrap;gap:8px}
.pill{cursor:pointer;font-family:var(--font-mono,monospace);font-size:12px;padding:6px 14px;border-radius:20px;border:.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);transition:all .15s}
.pill:hover{border-color:var(--color-border-primary);color:var(--color-text-primary)}
.pill.active{background:#1D9E75;border-color:#1D9E75;color:#fff}
.start-btn{width:100%;padding:12px;font-family:var(--font-mono,monospace);font-size:14px;cursor:pointer;background:#1D9E75;border:none;border-radius:var(--border-radius-md);color:#fff;margin-top:.5rem;transition:opacity .15s}
.start-btn:hover{opacity:.85}

.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:.5px solid var(--color-border-tertiary)}
.game-title{font-size:13px;color:var(--color-text-secondary)}
.game-title span{color:#1D9E75}
.timer{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.game-body{display:grid;grid-template-columns:auto 1fr;gap:1.5rem;align-items:start}
.grid-wrap{overflow:auto}
.crossword-grid{display:inline-grid;gap:0;border:2px solid #555}
.cell{width:36px;height:36px;background:var(--color-background-primary);border:1.5px solid #555;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:background .1s}
.cell.black{background:#222;cursor:default;border:1.5px solid #222}
.cell.active{background:#E1F5EE}
.cell.word-highlight{background:#E1F5EE;opacity:.6}
.cell.correct{background:#9FE1CB}
.cell.wrong{background:#F5C4B3}
.cell-num{position:absolute;top:2px;left:3px;font-size:8px;color:var(--color-text-secondary);line-height:1}
.cell-letter{font-size:15px;font-weight:500;text-transform:uppercase;color:var(--color-text-primary)}
.clues-panel{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.clue-group h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-secondary);margin-bottom:.5rem}
.clue-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.clue-item{font-size:12px;padding:5px 8px;border-radius:var(--border-radius-md);cursor:pointer;border:.5px solid transparent;color:var(--color-text-secondary);transition:all .1s;line-height:1.4}
.clue-item:hover{background:var(--color-background-secondary)}
.clue-item.active{background:#E1F5EE;border-color:#5DCAA5;color:var(--color-text-primary)}
.clue-item.solved{color:#0F6E56;text-decoration:line-through;opacity:.6}
.clue-num{font-weight:500;color:var(--color-text-primary);margin-right:4px}
.btn-row{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap}
.btn-row button{font-family:var(--font-mono,monospace);font-size:12px;padding:7px 14px;cursor:pointer;border-radius:var(--border-radius-md);border:1.5px solid #555;background:var(--color-background-secondary);color:var(--color-text-primary);transition:all .15s}
.btn-row button:hover{background:var(--color-background-primary);border-color:#333}
.active-clue-bar{font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);padding:7px 10px;border-radius:var(--border-radius-md);margin-bottom:8px;min-height:34px;border-left:3px solid #1D9E75}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;background:#E1F5EE;color:#0F6E56;margin-left:6px;font-family:var(--font-mono,monospace)}
</style>

<div id="app">
<h2 class="sr-only">Front-end developer crossword puzzle game</h2>

<div id="filter-screen" class="screen active">
  <div class="terminal-header"><span>~/dev-crossword</span> $ choose your config</div>
  <div class="filter-section">
    <div class="filter-label">// theme</div>
    <div class="filter-pills" id="theme-pills">
      <div class="pill active" data-val="all">All topics</div>
      <div class="pill" data-val="html">HTML</div>
      <div class="pill" data-val="css">CSS</div>
      <div class="pill" data-val="js">JavaScript</div>
      <div class="pill" data-val="react">React</div>
      <div class="pill" data-val="tools">Dev tools</div>
    </div>
  </div>
  <div class="filter-section">
    <div class="filter-label">// difficulty</div>
    <div class="filter-pills" id="diff-pills">
      <div class="pill active" data-val="easy">Easy</div>
      <div class="pill" data-val="medium">Medium</div>
      <div class="pill" data-val="hard">Hard</div>
    </div>
  </div>
  <button class="start-btn" onclick="startGame()">./run-puzzle.sh</button>
</div>

<div id="game-screen" class="screen">
  <div class="game-header">
    <div class="game-title"><span>~/dev-crossword</span> $ solving... <span id="badge-theme" class="badge"></span><span id="badge-diff" class="badge"></span></div>
    <div class="timer" id="timer">00:00</div>
  </div>
  <div id="active-clue-bar" class="active-clue-bar">Select a cell to begin</div>
  <div class="game-body">
    <div>
      <div class="grid-wrap"><div class="crossword-grid" id="grid"></div></div>
      <div class="btn-row">
        <button onclick="checkAnswers()">Check</button>
        <button onclick="revealWord()">Reveal word</button>
        <button onclick="revealAll()">Reveal all</button>
        <button onclick="goBack()">New puzzle</button>
      </div>
    </div>
    <div class="clues-panel">
      <div class="clue-group"><h3>Across</h3><ul class="clue-list" id="across-list"></ul></div>
      <div class="clue-group"><h3>Down</h3><ul class="clue-list" id="down-list"></ul></div>
    </div>
  </div>
</div>
</div>

    easy:{
      grid:["GIT__","U_NPM","L____","PNPM_"],
      words:[

        {word:"NPM",row:1,col:2,dir:"across",num:2,clue:"Node package manager — npm install"},

      ]

      grid:["WEBPACK_","A_A_____","T_B_____","C_E_____","H_L_____","PRETTIER"],
      words:[
        {word:"WEBPACK",row:0,col:0,dir:"across",num:1,clue:"Module bundler that processes JS and assets"},
        {word:"WATCH",row:0,col:0,dir:"down",num:1,clue:"Build mode that rebuilds on file changes"},
        {word:"BABEL",row:0,col:2,dir:"down",num:2,clue:"JS transpiler converting modern code for older browsers"},

        {word:"TREESHAKING",row:3,col:0,dir:"across",num:2,clue:"Dead code elimination during the JS bundling process"},

      ]

};

const WIN_MSGS = ["// all tests passed","// merged to main","// 100% coverage","// ship it!","// no console.log left behind"];

let state = {theme:'all',diff:'easy',cells:[],words:[],activeWord:null,activeCell:null,timerInt:null,seconds:0,solved:false};
let clueElMap = {};

function setupPills(id, key){
  document.querySelectorAll(`#${id} .pill`).forEach(p=>{
    p.addEventListener('click',()=>{
      document.querySelectorAll(`#${id} .pill`).forEach(x=>x.classList.remove('active'));
      p.classList.add('active');
      state[key]=p.dataset.val;
    });
  });
}
setupPills('theme-pills','theme');
setupPills('diff-pills','diff');

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function fmt(s){ return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

function startGame(){
  document.removeEventListener('keydown', onKey);
  const puzzle = PUZZLES[state.theme]?.[state.diff] || PUZZLES.all.easy;
  buildCrossword(puzzle);
  document.getElementById('badge-theme').textContent = state.theme;
  document.getElementById('badge-diff').textContent = state.diff;
  state.seconds = 0;
  state.solved = false;
  state.activeWord = null;
  state.activeCell = null;
  document.getElementById('timer').textContent = '00:00';
  clearInterval(state.timerInt);
  state.timerInt = setInterval(()=>{
    if(state.solved) return;
    state.seconds++;
    document.getElementById('timer').textContent = fmt(state.seconds);
  }, 1000);
  document.addEventListener('keydown', onKey);
  showScreen('game-screen');
}

function buildCrossword(puzzle){
  const rows = puzzle.grid.length;
  const cols = Math.max(...puzzle.grid.map(r=>r.length));
  state.cells = Array.from({length:rows},(_,r)=>
    Array.from({length:cols},(_,c)=>({r,c,letter:'',answer:puzzle.grid[r]?.[c]||'_',el:null,letterEl:null}))
  );
  state.words = puzzle.words;
  clueElMap = {};

  const numMap = {};
  puzzle.words.forEach(w=>{ numMap[`${w.row},${w.col}`] = w.num; });

  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `repeat(${cols},36px)`;
  grid.innerHTML = '';

  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cd = state.cells[r][c];
      const ch = cd.answer;
      const div = document.createElement('div');
      div.className = 'cell' + (ch==='_' ? ' black' : '');
      div.dataset.r = r; div.dataset.c = c;
      if(ch !== '_'){
        const num = numMap[`${r},${c}`];
        if(num){ const n=document.createElement('span'); n.className='cell-num'; n.textContent=num; div.appendChild(n); }
        const ltr = document.createElement('span'); ltr.className='cell-letter'; div.appendChild(ltr);
        cd.el = div; cd.letterEl = ltr;
        div.addEventListener('click', ()=>cellClick(r,c));
      }
      grid.appendChild(div);
    }
  }

  const aList = document.getElementById('across-list');
  const dList = document.getElementById('down-list');
  aList.innerHTML=''; dList.innerHTML='';

  puzzle.words.forEach(w=>{
    const li = document.createElement('li');
    li.className = 'clue-item';
    li.innerHTML = `<span class="clue-num">${w.num}.</span>${w.clue}`;
    li.addEventListener('click', ()=>selectWord(w));
    (w.dir==='across' ? aList : dList).appendChild(li);
    clueElMap[w.word+w.dir] = li;
  });

  document.getElementById('active-clue-bar').textContent = 'Select a cell to begin';
}

function cellInWord(r,c,w){
  if(w.dir==='across') return r===w.row && c>=w.col && c<w.col+w.word.length;
  return c===w.col && r>=w.row && r<w.row+w.word.length;
}

function cellClick(r,c){
  const wordsHere = state.words.filter(w=>cellInWord(r,c,w));
  if(!wordsHere.length) return;
  if(state.activeCell?.r===r && state.activeCell?.c===c && wordsHere.length>1){
    const other = wordsHere.find(w=>w!==state.activeWord);
    if(other){ selectWord(other,r,c); return; }
  }
  const w = wordsHere.includes(state.activeWord) ? state.activeWord : wordsHere[0];
  selectWord(w,r,c);
}

function highlightWord(w, ar, ac){
  clearHighlights();
  for(let i=0;i<w.word.length;i++){
    const r=w.dir==='across'?w.row:w.row+i;
    const c=w.dir==='across'?w.col+i:w.col;
    const cd=state.cells[r]?.[c];
    if(cd?.el) cd.el.classList.add(r===ar&&c===ac ? 'active' : 'word-highlight');
  }
}

function selectWord(w, ar, ac){
  if(ar===undefined){ ar=w.row; ac=w.col; }
  state.activeWord = w;
  state.activeCell = {r:ar, c:ac};
  highlightWord(w, ar, ac);
  Object.values(clueElMap).forEach(li=>li.classList.remove('active'));
  const li = clueElMap[w.word+w.dir];
  if(li) li.classList.add('active');
  document.getElementById('active-clue-bar').textContent = `${w.num} ${w.dir.toUpperCase()}: ${w.clue}`;
}

function clearHighlights(){
  document.querySelectorAll('.cell').forEach(el=>el.classList.remove('active','word-highlight'));
}

function onKey(e){
  if(!state.activeCell || state.solved) return;
  const {r,c} = state.activeCell;
  const w = state.activeWord;
  if(!w) return;
  if(e.key==='Backspace'){
    const cd = state.cells[r]?.[c];
    if(cd?.letter){ cd.letter=''; if(cd.letterEl) cd.letterEl.textContent=''; }
    else moveCursor(-1);
  } else if(e.key.length===1 && /[a-zA-Z]/.test(e.key)){
    const cd = state.cells[r]?.[c];
    if(cd){ cd.letter=e.key.toUpperCase(); if(cd.letterEl) cd.letterEl.textContent=cd.letter; }
    moveCursor(1);
    checkWin();
  } else if(['ArrowRight','ArrowLeft','ArrowUp','ArrowDown'].includes(e.key)){
    e.preventDefault();
  }
}

function moveCursor(dir){
  const w = state.activeWord; if(!w) return;
  const {r,c} = state.activeCell;
  let idx = w.dir==='across' ? c-w.col : r-w.row;
  idx = Math.max(0, Math.min(w.word.length-1, idx+dir));
  const nr = w.dir==='across' ? w.row : w.row+idx;
  const nc = w.dir==='across' ? w.col+idx : w.col;
  state.activeCell = {r:nr, c:nc};
  highlightWord(w, nr, nc);
}

function checkAnswers(){
  state.cells.forEach(row=>row.forEach(cd=>{ if(cd.el) cd.el.classList.remove('correct','wrong'); }));
  state.words.forEach(w=>{
    const allCorrect = w.word.split('').every((ch,i)=>{
      const r=w.dir==='across'?w.row:w.row+i;
      const c=w.dir==='across'?w.col+i:w.col;
      return state.cells[r]?.[c]?.letter===ch;
    });
    const li = clueElMap[w.word+w.dir];
    if(li && allCorrect) li.classList.add('solved');
  });
  state.cells.forEach(row=>row.forEach(cd=>{
    if(!cd.el||!cd.letter) return;
    const wordsHere = state.words.filter(w=>cellInWord(cd.r,cd.c,w));
    const correct = wordsHere.some(w=>{
      const i = w.dir==='across' ? cd.c-w.col : cd.r-w.row;
      return cd.letter===w.word[i];
    });
    cd.el.classList.add(correct?'correct':'wrong');
  }));
}

function revealWord(){
  const w = state.activeWord; if(!w) return;
  w.word.split('').forEach((ch,i)=>{
    const r=w.dir==='across'?w.row:w.row+i;
    const c=w.dir==='across'?w.col+i:w.col;
    const cd=state.cells[r]?.[c];
    if(cd){ cd.letter=ch; if(cd.letterEl) cd.letterEl.textContent=ch; if(cd.el){cd.el.classList.remove('wrong');cd.el.classList.add('correct');} }
  });
  const li = clueElMap[w.word+w.dir];
  if(li) li.classList.add('solved');
  checkWin();
}

function revealAll(){
  state.words.forEach(w=>{
    w.word.split('').forEach((ch,i)=>{
      const r=w.dir==='across'?w.row:w.row+i;
      const c=w.dir==='across'?w.col+i:w.col;
      const cd=state.cells[r]?.[c];
      if(cd){ cd.letter=ch; if(cd.letterEl) cd.letterEl.textContent=ch; if(cd.el){cd.el.classList.remove('wrong');cd.el.classList.add('correct');} }
    });
    const li = clueElMap[w.word+w.dir];
    if(li) li.classList.add('solved');
  });
  winGame();
}

function checkWin(){
  const allDone = state.words.every(w=>
    w.word.split('').every((ch,i)=>{
      const r=w.dir==='across'?w.row:w.row+i;
      const c=w.dir==='across'?w.col+i:w.col;
      return state.cells[r]?.[c]?.letter===ch;
    })
  );
  if(allDone && !state.solved) winGame();
}

function winGame(){
  if(state.solved) return;
  state.solved = true;
  clearInterval(state.timerInt);
  document.removeEventListener('keydown', onKey);
  document.getElementById('active-clue-bar').textContent =
    `Solved in ${fmt(state.seconds)} — ${WIN_MSGS[Math.floor(Math.random()*WIN_MSGS.length)]} · Click "New puzzle" to play again.`;
}

function goBack(){
  clearInterval(state.timerInt);
  document.removeEventListener('keydown', onKey);
  state.activeWord=null; state.activeCell=null; state.solved=false;
  showScreen('filter-screen');
}
</script>
